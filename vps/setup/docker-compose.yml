version: "3.8"
services:
  questdb:
    image: questdb/questdb:latest
    container_name: brokiepedia-questdb
    ports:
      - "9000:9000"
      - "9009:9009"
      - "8812:8812"
    volumes:
      - questdb_data:/var/lib/questdb
    environment:
      - QDB_TELEMETRY_ENABLED=false
    restart: always

  chromadb:
    image: chromadb/chroma:latest
    container_name: brokiepedia-chromadb
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    restart: always

volumes:
  questdb_data:
  chroma_data:
