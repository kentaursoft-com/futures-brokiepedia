version: "3.8"

services:
  questdb:
    image: questdb/questdb:latest
    container_name: futures-questdb
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "8812:8812"
      - "9009:9009"
    volumes:
      - questdb-data:/var/lib/questdb
    environment:
      - QDB_PG_USER=admin
      - QDB_PG_PASSWORD=${QUESTDB_PASSWORD:-brokiepedia_quest_2026}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - futures-network

  chromadb:
    image: chromadb/chroma:latest
    container_name: futures-chromadb
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - ALLOW_RESET=false
      - ANONYMIZED_TELEMETRY=false
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - futures-network

  daemon:
    build:
      context: ./daemon
      dockerfile: Dockerfile
    container_name: futures-daemon
    restart: unless-stopped
    depends_on:
      questdb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ./daemon:/app
      - ./config:/app/config
      - ./logs:/app/logs
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - TRADING_MODE=${TRADING_MODE:-paper}
      - QUESTDB_HOST=questdb
      - QUESTDB_PORT=8812
      - QUESTDB_USER=admin
      - QUESTDB_PASSWORD=${QUESTDB_PASSWORD:-brokiepedia_quest_2026}
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - TURSO_DB_URL=${TURSO_DB_URL}
      - TURSO_DB_TOKEN=${TURSO_DB_TOKEN}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
      - BINANCE_API_KEY=${BINANCE_API_KEY}
      - BINANCE_SECRET_KEY=${BINANCE_SECRET_KEY}
      - LANGCHAIN_TRACING_V2=${LANGCHAIN_TRACING_V2:-false}
      - LANGCHAIN_API_KEY=${LANGCHAIN_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - futures-network

  # Optional: Prometheus for monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: futures-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - futures-network
    profiles:
      - monitoring

volumes:
  questdb-data:
  chroma-data:
  prometheus-data:

networks:
  futures-network:
    driver: bridge
