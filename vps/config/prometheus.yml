global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'futures-daemon'
    static_configs:
      - targets: ['daemon:8080']
    metrics_path: '/metrics'
    scrape_interval: 5s

  - job_name: 'questdb'
    static_configs:
      - targets: ['questdb:9000']
    scrape_interval: 30s

  - job_name: 'chromadb'
    static_configs:
      - targets: ['chromadb:8000']
    scrape_interval: 30s
